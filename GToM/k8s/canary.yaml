apiVersion: apps/v1
kind: Deployment
metadata:
  name: gtom-canary
  labels:
    app: gtom
    component: gstack
    track: canary
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gtom
      track: canary
  template:
    metadata:
      labels:
        app: gtom
        component: gstack
        track: canary
    spec:
      containers:
      - name: gtom
        image: gtom:canary
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3003
          name: http
        - containerPort: 8080
          name: health
        envFrom:
        - configMapRef:
            name: gtom-config
        readinessProbe:
          httpGet:
            path: /health/ready
            port: health
          periodSeconds: 10
          timeoutSeconds: 5
        livenessProbe:
          httpGet:
            path: /health/live
            port: health
          periodSeconds: 30
          timeoutSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: gtom-canary
  labels:
    app: gtom
    track: canary
spec:
  selector:
    app: gtom
    track: canary
  ports:
  - name: http
    port: 3003
    targetPort: http
  - name: health
    port: 8080
    targetPort: health
