apiVersion: v1
kind: ConfigMap
metadata:
  name: gtom-config
  labels:
    app: gtom
    component: gstack
data:
  gbrain-endpoint: "http://gbrain:3000"
  vulnerability-threshold: "0.7"
  authenticity-threshold: "0.8"
  ice-enabled: "true"
  influence-tracking: "true"
  log-level: "info"
  GBRAIN_ENDPOINT: "http://gbrain:3000"
  GTOM_HTTP_RATE_LIMIT_RPM: "120"
  GTOM_HTTP_RATE_LIMIT_RPH: "2000"
  GTOM_TENANT_RATE_LIMIT_RPM: "600"
  GTOM_TENANT_RATE_LIMIT_RPH: "10000"
  GTOM_SHUTDOWN_DRAIN_TIMEOUT_MS: "25000"
