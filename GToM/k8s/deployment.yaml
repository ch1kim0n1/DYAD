apiVersion: apps/v1
kind: Deployment
metadata:
  name: gtom
  labels:
    app: gtom
    component: gstack
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gtom
  template:
    metadata:
      labels:
        app: gtom
        component: gstack
    spec:
      containers:
      - name: gtom
        image: gtom:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3003
          name: http
        - containerPort: 8080
          name: health
        env:
        - name: NODE_ENV
          value: "production"
        - name: PORT
          value: "3003"
        - name: HEALTH_PORT
          value: "8080"
        - name: GBRAIN_ENDPOINT
          valueFrom:
            configMapKeyRef:
              name: gtom-config
              key: gbrain-endpoint
        - name: POSTGRES_URL
          valueFrom:
            secretKeyRef:
              name: gtom-secrets
              key: postgres-url
        - name: ANTHROPIC_API_KEY
          valueFrom:
            secretKeyRef:
              name: gtom-secrets
              key: anthropic-api-key
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: gtom-secrets
              key: openai-api-key
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health/live
            port: health
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health/ready
            port: health
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        volumeMounts:
        - name: data
          mountPath: /app/data
      volumes:
      - name: data
        emptyDir: {}
      terminationGracePeriodSeconds: 30
