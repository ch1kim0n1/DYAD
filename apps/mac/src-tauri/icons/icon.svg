<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- DYAD app icon (#79).
       Two overlapping speech bubbles forming a Venn intersection.
       Deep navy + warm amber — matches the Map view palette. -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0a0c"/>
      <stop offset="1" stop-color="#16161a"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="1024" height="1024" rx="220" fill="url(#bg)"/>

  <!-- Self bubble (navy) -->
  <circle cx="380" cy="490" r="260" fill="#5b8def" opacity="0.85"/>
  <!-- Partner bubble (amber) -->
  <circle cx="644" cy="490" r="260" fill="#f59e0b" opacity="0.85"/>
  <!-- Intersection accent -->
  <path d="M 512 230 a 260 260 0 0 1 0 520 a 260 260 0 0 1 0 -520 z" fill="#fde047" opacity="0.55"/>

  <!-- Tail under each bubble — subtle, only at large sizes -->
  <path d="M 270 720 L 220 800 L 340 760 Z" fill="#5b8def" opacity="0.85"/>
  <path d="M 754 720 L 804 800 L 684 760 Z" fill="#f59e0b" opacity="0.85"/>
</svg>
