apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "gagent.fullname" . }}
  labels:
    {{- include "gagent.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "gagent.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "gagent.selectorLabels" . | nindent 8 }}
    spec:
      containers:
      - name: {{ .Chart.Name }}
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - containerPort: {{ .Values.service.mcpPort }}
          name: mcp
        - containerPort: {{ .Values.service.healthPort }}
          name: health
        env:
        - name: NODE_ENV
          value: "production"
        - name: HEALTH_PORT
          value: "{{ .Values.service.healthPort }}"
        - name: LOG_LEVEL
          value: {{ .Values.config.logLevel | quote }}
        - name: MODEL_REGISTRY_ENABLED
          value: {{ .Values.config.modelRegistryEnabled | quote }}
        - name: TIER_SELECTION
          value: {{ .Values.config.tierSelection | quote }}
        - name: POSTGRES_URL
          valueFrom:
            secretKeyRef:
              name: {{ include "gagent.fullname" . }}-secrets
              key: postgres-url
        - name: ANTHROPIC_API_KEY
          valueFrom:
            secretKeyRef:
              name: {{ include "gagent.fullname" . }}-secrets
              key: anthropic-api-key
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: {{ include "gagent.fullname" . }}-secrets
              key: openai-api-key
        resources:
          {{- toYaml .Values.resources | nindent 10 }}
        livenessProbe:
          httpGet:
            path: /health/live
            port: health
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health/ready
            port: health
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        volumeMounts:
        - name: data
          mountPath: /app/data
      volumes:
      - name: data
        emptyDir: {}
      terminationGracePeriodSeconds: 30
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
