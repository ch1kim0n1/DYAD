apiVersion: v1
kind: Service
metadata:
  name: {{ include "gagent.fullname" . }}
  labels:
    {{- include "gagent.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
  - port: {{ .Values.service.mcpPort }}
    targetPort: mcp
    protocol: TCP
    name: mcp
  - port: {{ .Values.service.healthPort }}
    targetPort: health
    protocol: TCP
    name: health
  selector:
    {{- include "gagent.selectorLabels" . | nindent 4 }}
