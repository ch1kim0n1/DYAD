apiVersion: v1
kind: Service
metadata:
  name: gagent
  labels:
    app: gagent
    component: gstack
spec:
  type: ClusterIP
  ports:
  - port: 3004
    targetPort: 3004
    protocol: TCP
    name: mcp
  - port: 8080
    targetPort: 8080
    protocol: TCP
    name: health
  selector:
    app: gagent
