version: '3.8'

services:
  gbrain:
    build: .
    ports:
      - '3000:3000'
    environment:
      - NODE_ENV=production
      - PORT=3000
      - GBRAIN_DB_PATH=/data/gbrain.db
    volumes:
      - gbrain-data:/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3000/health']
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

volumes:
  gbrain-data:
