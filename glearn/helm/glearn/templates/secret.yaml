apiVersion: v1
kind: Secret
metadata:
  name: {{ include "glearn.fullname" . }}-secrets
  labels:
    {{- include "glearn.labels" . | nindent 4 }}
type: Opaque
stringData:
  postgres-url: {{ .Values.secrets.postgresUrl | quote }}
  anthropic-api-key: {{ .Values.secrets.anthropicApiKey | quote }}
  openai-api-key: {{ .Values.secrets.openaiApiKey | quote }}
