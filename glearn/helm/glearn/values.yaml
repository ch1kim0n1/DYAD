replicaCount: 1

image:
  repository: glearn
  pullPolicy: IfNotPresent
  tag: "latest"

service:
  type: ClusterIP
  mcpPort: 3005
  healthPort: 8080

resources:
  requests:
    memory: "256Mi"
    cpu: "250m"
  limits:
    memory: "512Mi"
    cpu: "500m"

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

nodeSelector: {}
tolerations: []
affinity: {}

config:
  patternMiningEnabled: "true"
  proposalGeneration: "true"
  observationWindow: "7d"
  logLevel: "info"

secrets:
  postgresUrl: ""
  anthropicApiKey: ""
  openaiApiKey: ""
