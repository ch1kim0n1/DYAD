apiVersion: apps/v1
kind: Deployment
metadata:
  name: glearn
  labels:
    app: glearn
    component: gstack
spec:
  replicas: 1
  selector:
    matchLabels:
      app: glearn
  template:
    metadata:
      labels:
        app: glearn
        component: gstack
    spec:
      containers:
      - name: glearn
        image: glearn:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3005
          name: mcp
        - containerPort: 8080
          name: health
        env:
        - name: NODE_ENV
          value: "production"
        - name: HEALTH_PORT
          value: "8080"
        - name: POSTGRES_URL
          valueFrom:
            secretKeyRef:
              name: glearn-secrets
              key: postgres-url
        - name: ANTHROPIC_API_KEY
          valueFrom:
            secretKeyRef:
              name: glearn-secrets
              key: anthropic-api-key
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: glearn-secrets
              key: openai-api-key
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health/live
            port: health
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health/ready
            port: health
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        volumeMounts:
        - name: data
          mountPath: /app/data
      volumes:
      - name: data
        emptyDir: {}
      terminationGracePeriodSeconds: 30
