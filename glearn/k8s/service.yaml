apiVersion: v1
kind: Service
metadata:
  name: glearn
  labels:
    app: glearn
    component: gstack
spec:
  type: ClusterIP
  ports:
  - port: 3005
    targetPort: 3005
    protocol: TCP
    name: mcp
  - port: 8080
    targetPort: 8080
    protocol: TCP
    name: health
  selector:
    app: glearn
