apiVersion: v1
kind: Service
metadata:
  name: gmirror
  labels:
    app: gmirror
    component: gstack
spec:
  type: ClusterIP
  ports:
  - port: 3002
    targetPort: 3002
    protocol: TCP
    name: http
  - port: 8080
    targetPort: 8080
    protocol: TCP
    name: health
  selector:
    app: gmirror
