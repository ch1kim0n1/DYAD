apiVersion: apps/v1
kind: Deployment
metadata:
  name: gorchestrator
  labels:
    app: gorchestrator
    component: gstack
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gorchestrator
  template:
    metadata:
      labels:
        app: gorchestrator
        component: gstack
    spec:
      containers:
      - name: gorchestrator
        image: gorchestrator:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3001
          name: mcp
        - containerPort: 8080
          name: health
        env:
        - name: NODE_ENV
          value: "production"
        - name: HEALTH_PORT
          value: "8080"
        - name: GMIRROR_ENDPOINT
          value: "http://gmirror:3002"
        - name: GTOM_ENDPOINT
          value: "http://gtom:3003"
        - name: POSTGRES_URL
          valueFrom:
            secretKeyRef:
              name: gorchestrator-secrets
              key: postgres-url
        - name: ANTHROPIC_API_KEY
          valueFrom:
            secretKeyRef:
              name: gorchestrator-secrets
              key: anthropic-api-key
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: gorchestrator-secrets
              key: openai-api-key
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health/live
            port: health
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health/ready
            port: health
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        volumeMounts:
        - name: data
          mountPath: /app/data
      volumes:
      - name: data
        emptyDir: {}
      terminationGracePeriodSeconds: 30
