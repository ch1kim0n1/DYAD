apiVersion: v1
kind: Service
metadata:
  name: gorchestrator
  labels:
    app: gorchestrator
    component: gstack
spec:
  type: ClusterIP
  ports:
  - port: 3001
    targetPort: 3001
    protocol: TCP
    name: mcp
  - port: 8080
    targetPort: 8080
    protocol: TCP
    name: health
  selector:
    app: gorchestrator
