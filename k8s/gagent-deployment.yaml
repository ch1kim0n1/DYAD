apiVersion: apps/v1
kind: Deployment
metadata:
  name: gagent
  namespace: gstack
  labels:
    app: gagent
    component: gstack
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gagent
  template:
    metadata:
      labels:
        app: gagent
        component: gstack
    spec:
      containers:
      - name: gagent
        image: ghcr.io/gstack/gagent:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3001
          name: http
        env:
        - name: DYAD_PII_REDACTION
          value: "true"
        envFrom:
        - configMapRef:
            name: gstack-config
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health/live
            port: 3001
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 3001
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        volumeMounts:
        - name: data
          mountPath: /data
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: gagent-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: gagent-svc
  namespace: gstack
  labels:
    app: gagent
    component: gstack
spec:
  type: ClusterIP
  ports:
  - port: 3001
    targetPort: 3001
    protocol: TCP
    name: http
  selector:
    app: gagent
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: gagent-pvc
  namespace: gstack
  labels:
    app: gagent
    component: gstack
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
