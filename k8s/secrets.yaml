apiVersion: v1
kind: Secret
metadata:
  name: gstack-secrets
  namespace: gstack
  labels:
    component: gstack
type: Opaque
stringData:
  # Anthropic API Key for Claude models
  ANTHROPIC_API_KEY: ""
  # OpenAI API Key for GPT models
  OPENAI_API_KEY: ""
  # Database connection strings
  POSTGRES_CONNECTION_STRING: "postgresql://postgres:postgres@postgres-svc:5432/gstack"
  # Redis connection (already in configmap, but can be overridden here)
  REDIS_PASSWORD: ""
  # Additional service-specific secrets
  GBRAIN_ENCRYPTION_KEY: ""
  GMIRROR_SECRET_KEY: ""
  GTOM_SECRET_KEY: ""
  GAGENT_SECRET_KEY: ""
  GLEARN_SECRET_KEY: ""
  GORCHESTRATOR_SECRET_KEY: ""
