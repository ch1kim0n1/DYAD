# Prometheus Configuration for G-Stack Monitoring

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'gstack-production'
    environment: 'production'

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            # - alertmanager:9093

# Load rules once and periodically evaluate them
rule_files:
  - 'alerts/*.yml'

# Scrape configurations
scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # GOrchestrator
  - job_name: 'gorchestrator'
    static_configs:
      - targets: ['gorchestrator:3000']
    metrics_path: '/metrics'
    scrape_interval: 10s

  # GAgent
  - job_name: 'gagent'
    static_configs:
      - targets: ['gagent:3001']
    metrics_path: '/metrics'
    scrape_interval: 10s

  # GLearn
  - job_name: 'glearn'
    static_configs:
      - targets: ['glearn:3002']
    metrics_path: '/metrics'
    scrape_interval: 10s

  # GMirror
  - job_name: 'gmirror'
    static_configs:
      - targets: ['gmirror:3003']
    metrics_path: '/metrics'
    scrape_interval: 10s

  # GBrain
  - job_name: 'gbrain'
    static_configs:
      - targets: ['gbrain:8000']
    metrics_path: '/metrics'
    scrape_interval: 10s

  # Node Exporter (system metrics)
  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100']
    scrape_interval: 15s

  # cAdvisor (container metrics)
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
    scrape_interval: 15s
